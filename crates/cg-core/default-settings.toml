[embedding]
provider = "fastembed"
model = "BAAI/bge-small-en-v1.5"
batch_size = 32

[indexing]
max_file_size_bytes = 1048576
min_chunk_tokens = 20
max_chunk_tokens = 512
default_limit = 10

[lsp]
rust_analyzer_path = "rust-analyzer"
pyright_path = "pyright"
tsserver_path = "typescript-language-server"
