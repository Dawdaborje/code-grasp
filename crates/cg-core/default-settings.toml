[embedding]
provider = "fastembed"
model = "BAAI/bge-small-en-v1.5"
# How many chunk texts are passed to the ONNX model per inference call (default 64).
# Tune for RAM and throughput: try 32 on <8GB RAM, 128 on >16GB RAM or with GPU EP; benchmark with `cg index --force`.
batch_size = 64

[indexing]
max_file_size_bytes = 10485760
min_chunk_tokens = 20
max_chunk_tokens = 512
default_limit = 10
# Optional: merge more extensions (no leading dot), e.g. Arch hook scripts:
# extra_extensions = ["install", "hook"]

[lsp]
rust_analyzer_path = "rust-analyzer"
pyright_path = "pyright"
tsserver_path = "typescript-language-server"
